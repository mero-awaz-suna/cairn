[phases.setup]
nixPkgs = ["python312", "gcc"]
onlyIncludeFiles = ["requirements.txt", "*.py", "**/*.py", "**/*.wav"]

[phases.install]
cmds = ["python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt"]

[start]
cmd = ". /opt/venv/bin/activate && uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
