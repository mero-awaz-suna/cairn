<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="mossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B8F71"/>
      <stop offset="100%" style="stop-color:#5A7D60"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="256" cy="256" r="256" fill="url(#mossGrad)"/>
  <!-- Cairn stones - three stacked stones -->
  <!-- Bottom stone (largest) -->
  <ellipse cx="256" cy="340" rx="90" ry="36" fill="white" opacity="0.95"/>
  <!-- Middle stone -->
  <ellipse cx="256" cy="272" rx="65" ry="30" fill="white" opacity="0.9"/>
  <!-- Top stone (smallest) -->
  <ellipse cx="256" cy="215" rx="42" ry="24" fill="white" opacity="0.85"/>
  <!-- Small peak dot -->
  <circle cx="256" cy="175" r="12" fill="white" opacity="0.8"/>
</svg>
